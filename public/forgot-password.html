<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Şifremi Unuttum - NICHIFY PRO</title>
  
  <link rel="stylesheet" href="/css/core.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/auth.css">
  
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>">
</head>
<body>
  
  <div class="aurora-bg">
    <div class="aurora-3"></div>
  </div>
  
  <a href="/login" class="auth-back">
    <span>←</span>
    <span>Giriş Sayfası</span>
  </a>
  
  <div class="auth-page">
    <div class="auth-container">
      
      <div class="auth-card">
        
        <a href="/" class="auth-logo">
          <span class="auth-logo-icon">🎯</span>
          <span class="auth-logo-text gradient-text-aurora">NICHIFY</span>
          <span class="badge badge-pro badge-sm">PRO</span>
        </a>
        
        <div class="auth-header">
          <div style="font-size: 3rem; margin-bottom: var(--space-md);">🔒</div>
          <h1>Şifremi Unuttum</h1>
          <p>Email adresini gir, sana <strong>şifre sıfırlama linki</strong> gönderelim.</p>
        </div>
        
        <!-- Alert -->
        <div id="alert" class="alert alert-danger auth-alert hidden">
          <span class="alert-icon">⚠️</span>
          <div class="alert-content">
            <div id="alert-message"></div>
          </div>
        </div>
        
        <div id="successAlert" class="alert alert-success auth-alert hidden">
          <span class="alert-icon">✅</span>
          <div class="alert-content">
            <div class="alert-title">Link gönderildi!</div>
            <div>Email kutunu kontrol et. Spam klasörünü de kontrol etmeyi unutma!</div>
          </div>
        </div>
        
        <!-- Form -->
        <form id="forgotForm" class="auth-form">
          
          <div class="form-group">
            <label class="form-label">E-posta Adresin</label>
            <input 
              type="email" 
              id="email" 
              class="form-input" 
              placeholder="ornek@email.com"
              required
              autocomplete="email"
            >
            <span class="form-help">Kayıtlı email adresini gir</span>
          </div>
          
          <button type="submit" class="btn btn-primary btn-lg btn-block auth-submit" id="submitBtn">
            <span class="btn-text">📧 Sıfırlama Linki Gönder</span>
            <span class="spinner spinner-sm hidden" id="spinner"></span>
          </button>
          
        </form>
        
        <div class="auth-footer">
          Şifreni hatırladın mı? 
          <a href="/login">Giriş Yap</a>
        </div>
        
      </div>
      
    </div>
  </div>
  
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const submitBtn = document.getElementById('submitBtn');
      const btnText = submitBtn.querySelector('.btn-text');
      const spinner = document.getElementById('spinner');
      const alert = document.getElementById('alert');
      const alertMessage = document.getElementById('alert-message');
      const successAlert = document.getElementById('successAlert');
      
      submitBtn.disabled = true;
      btnText.textContent = 'Gönderiliyor...';
      spinner.classList.remove('hidden');
      alert.classList.add('hidden');
      successAlert.classList.add('hidden');
      
      const result = await Auth.resetPassword(email);
      
      if (result.success) {
        successAlert.classList.remove('hidden');
        document.getElementById('forgotForm').reset();
        btnText.textContent = '✓ Link Gönderildi';
        spinner.classList.add('hidden');
        
        setTimeout(() => {
          submitBtn.disabled = false;
          btnText.textContent = '📧 Sıfırlama Linki Gönder';
        }, 60000); // 60 saniye sonra tekrar gönderilebilir
      } else {
        alertMessage.textContent = result.message;
        alert.classList.remove('hidden');
        submitBtn.disabled = false;
        btnText.textContent = '📧 Sıfırlama Linki Gönder';
        spinner.classList.add('hidden');
      }
    });
    
  </script>
</body>
</html>
