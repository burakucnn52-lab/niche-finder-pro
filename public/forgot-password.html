<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Reset your NICHIFY PRO password. Enter your email to receive a password reset link.">
  
  <title>Forgot Password - NICHIFY PRO</title>
  
  <link rel="stylesheet" href="/css/core.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/auth.css">
  
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>">
</head>
<body>
  
  <!-- Aurora Background -->
  <div class="aurora-bg">
    <div class="aurora-3"></div>
  </div>
  
  <!-- Back to home -->
  <a href="/" class="auth-back">
    <span>←</span>
    <span>Back to Home</span>
  </a>
  
  <!-- Auth Page -->
  <div class="auth-page">
    <div class="auth-container">
      
      <div class="auth-card">
        
        <a href="/" class="auth-logo">
          <span class="auth-logo-icon">🎯</span>
          <span class="auth-logo-text gradient-text-aurora">NICHIFY</span>
          <span class="badge badge-pro badge-sm">PRO</span>
        </a>
        
        <div class="auth-header">
          <div style="font-size: 3rem; margin-bottom: var(--space-md);">🔒</div>
          <h1>Forgot Password?</h1>
          <p>Enter your email and we'll send you a <strong>password reset link</strong>.</p>
        </div>
        
        <!-- Alert -->
        <div id="alert" class="alert alert-danger auth-alert hidden">
          <span class="alert-icon">⚠️</span>
          <div class="alert-content">
            <div id="alert-message"></div>
          </div>
        </div>
        
        <div id="successAlert" class="alert alert-success auth-alert hidden">
          <span class="alert-icon">✅</span>
          <div class="alert-content">
            <div class="alert-title">Link sent!</div>
            <div>Check your email inbox. Don't forget to check your spam folder too!</div>
          </div>
        </div>
        
        <!-- Form -->
        <form id="forgotForm" class="auth-form">
          
          <div class="form-group">
            <label class="form-label">Your Email Address</label>
            <input 
              type="email" 
              id="email" 
              class="form-input" 
              placeholder="you@example.com"
              required
              autocomplete="email"
            >
            <span class="form-help">Enter your registered email address</span>
          </div>
          
          <button type="submit" class="btn btn-primary btn-lg btn-block auth-submit" id="submitBtn">
            <span class="btn-text">📧 Send Reset Link</span>
            <span class="spinner spinner-sm hidden" id="spinner"></span>
          </button>
          
        </form>
        
        <div class="auth-footer">
          Remember your password? 
          <a href="/login">Log In</a>
        </div>
        
      </div>
      
    </div>
  </div>
  
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    // Forgot Password Form
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const submitBtn = document.getElementById('submitBtn');
      const btnText = submitBtn.querySelector('.btn-text');
      const spinner = document.getElementById('spinner');
      const alert = document.getElementById('alert');
      const alertMessage = document.getElementById('alert-message');
      const successAlert = document.getElementById('successAlert');
      
      // Loading state
      submitBtn.disabled = true;
      btnText.textContent = 'Sending...';
      spinner.classList.remove('hidden');
      alert.classList.add('hidden');
      successAlert.classList.add('hidden');
      
      // Send reset link
      const result = await Auth.forgotPassword(email);
      
      if (result.success) {
        successAlert.classList.remove('hidden');
        document.getElementById('forgotForm').reset();
        btnText.textContent = '✓ Link Sent!';
      } else {
        alertMessage.textContent = result.message;
        alert.classList.remove('hidden');
        submitBtn.disabled = false;
        btnText.textContent = '📧 Send Reset Link';
        spinner.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
