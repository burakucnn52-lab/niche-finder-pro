<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kayıt Ol - NICHIFY PRO</title>
  
  <link rel="stylesheet" href="/css/core.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/auth.css">
  
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
</head>
<body>
  
  <!-- Aurora Background -->
  <div class="aurora-bg">
    <div class="aurora-3"></div>
  </div>
  
  <!-- Back to home -->
  <a href="/" class="auth-back">
    <span>←</span>
    <span>Ana Sayfa</span>
  </a>
  
  <!-- Auth Page -->
  <div class="auth-page">
    <div class="auth-container">
      
      <div class="auth-card">
        
        <a href="/" class="auth-logo">
          <span class="auth-logo-icon">🎯</span>
          <span class="auth-logo-text gradient-text-aurora">NICHIFY</span>
          <span class="badge badge-pro badge-sm">PRO</span>
        </a>
        
        <div class="auth-header">
          <h1>Hesap Oluştur 🚀</h1>
          <p>Ücretsiz başla, kazançlı nişleri keşfet</p>
        </div>
        
        <!-- Alert -->
        <div id="alert" class="alert alert-danger auth-alert hidden">
          <span class="alert-icon">⚠️</span>
          <div class="alert-content">
            <div id="alert-message"></div>
          </div>
        </div>
        
        <div id="successAlert" class="alert alert-success auth-alert hidden">
          <span class="alert-icon">✅</span>
          <div class="alert-content">
            <div class="alert-title">Kayıt başarılı!</div>
            <div>E-posta adresinize doğrulama linki gönderildi.</div>
          </div>
        </div>
        
        <!-- Register Form -->
        <form id="registerForm" class="auth-form">
          
          <div class="form-group">
            <label class="form-label">Ad Soyad</label>
            <input 
              type="text" 
              id="name" 
              class="form-input" 
              placeholder="Adınız ve Soyadınız"
              required
              autocomplete="name"
              minlength="2"
            >
          </div>
          
          <div class="form-group">
            <label class="form-label">E-posta</label>
            <input 
              type="email" 
              id="email" 
              class="form-input" 
              placeholder="ornek@email.com"
              required
              autocomplete="email"
            >
          </div>
          
          <div class="form-group">
            <label class="form-label">Şifre</label>
            <input 
              type="password" 
              id="password" 
              class="form-input" 
              placeholder="En az 6 karakter"
              required
              autocomplete="new-password"
              minlength="6"
            >
            <div class="password-strength" id="strengthBars">
              <div class="password-strength-bar"></div>
              <div class="password-strength-bar"></div>
              <div class="password-strength-bar"></div>
              <div class="password-strength-bar"></div>
            </div>
            <div class="password-strength-text" id="strengthText">Şifre gücü</div>
          </div>
          
          <label class="checkbox" style="margin-top: var(--space-sm);">
            <input type="checkbox" id="terms" required>
            <span style="font-size: 0.8125rem; color: var(--text-secondary);">
              <a href="/sartlar" target="_blank">Kullanım Şartları</a> ve 
              <a href="/gizlilik" target="_blank">Gizlilik Politikası</a>'nı kabul ediyorum
            </span>
          </label>
          
          <button type="submit" class="btn btn-primary btn-lg btn-block auth-submit" id="submitBtn">
            <span class="btn-text">Hesap Oluştur</span>
            <span class="spinner spinner-sm hidden" id="spinner"></span>
          </button>
          
        </form>
        
        <div class="auth-divider">veya</div>
        
        <div class="auth-social">
          <button type="button" class="btn-google" id="googleBtn">
            <svg width="20" height="20" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Google ile Kayıt Ol
          </button>
        </div>
        
        <div class="auth-footer">
          Zaten hesabın var mı? 
          <a href="/login">Giriş Yap</a>
        </div>
        
      </div>
      
    </div>
  </div>
  
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    // Eğer zaten giriş yapmışsa dashboard'a yönlendir
    (async () => {
      const isLoggedIn = await Auth.isLoggedIn();
      if (isLoggedIn) {
        window.location.href = '/dashboard';
      }
    })();
    
    // Password Strength
    const passwordInput = document.getElementById('password');
    const strengthBars = document.querySelectorAll('.password-strength-bar');
    const strengthText = document.getElementById('strengthText');
    
    passwordInput.addEventListener('input', (e) => {
      const password = e.target.value;
      let strength = 0;
      
      if (password.length >= 6) strength++;
      if (password.length >= 10) strength++;
      if (/[A-Z]/.test(password) && /[a-z]/.test(password)) strength++;
      if (/[0-9]/.test(password) && /[^a-zA-Z0-9]/.test(password)) strength++;
      
      const levels = ['weak', 'weak', 'medium', 'medium', 'strong'];
      const texts = ['Zayıf', 'Zayıf', 'Orta', 'İyi', 'Güçlü'];
      const colors = ['var(--danger)', 'var(--danger)', 'var(--warning)', 'var(--warning)', 'var(--success)'];
      
      strengthBars.forEach((bar, index) => {
        bar.className = 'password-strength-bar';
        if (index < strength) {
          bar.classList.add('active', levels[strength]);
        }
      });
      
      if (password.length > 0) {
        strengthText.textContent = `Şifre gücü: ${texts[strength]}`;
        strengthText.style.color = colors[strength];
      } else {
        strengthText.textContent = 'Şifre gücü';
        strengthText.style.color = 'var(--text-muted)';
      }
    });
    
    // Register Form
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const submitBtn = document.getElementById('submitBtn');
      const btnText = submitBtn.querySelector('.btn-text');
      const spinner = document.getElementById('spinner');
      const alert = document.getElementById('alert');
      const alertMessage = document.getElementById('alert-message');
      const successAlert = document.getElementById('successAlert');
      
      // Loading
      submitBtn.disabled = true;
      btnText.textContent = 'Hesap oluşturuluyor...';
      spinner.classList.remove('hidden');
      alert.classList.add('hidden');
      successAlert.classList.add('hidden');
      
      // Register
      const result = await Auth.register(email, password, name);
      
      if (result.success) {
        successAlert.classList.remove('hidden');
        document.getElementById('registerForm').reset();
        btnText.textContent = '✓ Kayıt Başarılı!';
        
        // 3 saniye sonra login'e yönlendir
        setTimeout(() => {
          window.location.href = '/login';
        }, 3000);
      } else {
        alertMessage.textContent = result.message;
        alert.classList.remove('hidden');
        submitBtn.disabled = false;
        btnText.textContent = 'Hesap Oluştur';
        spinner.classList.add('hidden');
      }
    });
    
    // Google Register
    document.getElementById('googleBtn').addEventListener('click', async () => {
      await Auth.loginWithGoogle();
    });
  </script>
</body>
</html>
