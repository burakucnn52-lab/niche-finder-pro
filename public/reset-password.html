<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yeni Şifre Belirle - NICHIFY PRO</title>
  
  <link rel="stylesheet" href="/css/core.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/auth.css">
  
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔑</text></svg>">
</head>
<body>
  
  <div class="aurora-bg">
    <div class="aurora-3"></div>
  </div>
  
  <a href="/" class="auth-back">
    <span>←</span>
    <span>Ana Sayfa</span>
  </a>
  
  <div class="auth-page">
    <div class="auth-container">
      
      <div class="auth-card">
        
        <a href="/" class="auth-logo">
          <span class="auth-logo-icon">🎯</span>
          <span class="auth-logo-text gradient-text-aurora">NICHIFY</span>
          <span class="badge badge-pro badge-sm">PRO</span>
        </a>
        
        <div class="auth-header">
          <div style="font-size: 3rem; margin-bottom: var(--space-md);">🔑</div>
          <h1>Yeni Şifre Belirle</h1>
          <p>Hesabın için <strong>güvenli yeni bir şifre</strong> seç.</p>
        </div>
        
        <!-- Alert -->
        <div id="alert" class="alert alert-danger auth-alert hidden">
          <span class="alert-icon">⚠️</span>
          <div class="alert-content">
            <div id="alert-message"></div>
          </div>
        </div>
        
        <div id="successAlert" class="alert alert-success auth-alert hidden">
          <span class="alert-icon">✅</span>
          <div class="alert-content">
            <div class="alert-title">Şifre güncellendi!</div>
            <div>Yeni şifren ile giriş yapabilirsin. 3 saniye içinde yönlendirileceksin...</div>
          </div>
        </div>
        
        <!-- Form -->
        <form id="resetForm" class="auth-form">
          
          <div class="form-group">
            <label class="form-label">Yeni Şifre</label>
            <input 
              type="password" 
              id="password" 
              class="form-input" 
              placeholder="En az 6 karakter"
              required
              autocomplete="new-password"
              minlength="6"
            >
            <div class="password-strength" id="strengthBars">
              <div class="password-strength-bar"></div>
              <div class="password-strength-bar"></div>
              <div class="password-strength-bar"></div>
              <div class="password-strength-bar"></div>
            </div>
            <div class="password-strength-text" id="strengthText">Şifre gücü</div>
          </div>
          
          <div class="form-group">
            <label class="form-label">Şifre Tekrar</label>
            <input 
              type="password" 
              id="confirmPassword" 
              class="form-input" 
              placeholder="Yeni şifreni tekrar gir"
              required
              autocomplete="new-password"
              minlength="6"
            >
          </div>
          
          <button type="submit" class="btn btn-primary btn-lg btn-block auth-submit" id="submitBtn">
            <span class="btn-text">🔒 Şifreyi Güncelle</span>
            <span class="spinner spinner-sm hidden" id="spinner"></span>
          </button>
          
        </form>
        
        <div class="auth-footer">
          Hatırladın mı? 
          <a href="/login">Giriş Yap</a>
        </div>
        
      </div>
      
    </div>
  </div>
  
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    
    // Password Strength
    const passwordInput = document.getElementById('password');
    const strengthBars = document.querySelectorAll('.password-strength-bar');
    const strengthText = document.getElementById('strengthText');
    
    passwordInput.addEventListener('input', (e) => {
      const password = e.target.value;
      let strength = 0;
      
      if (password.length >= 6) strength++;
      if (password.length >= 10) strength++;
      if (/[A-Z]/.test(password) && /[a-z]/.test(password)) strength++;
      if (/[0-9]/.test(password) && /[^a-zA-Z0-9]/.test(password)) strength++;
      
      const levels = ['weak', 'weak', 'medium', 'medium', 'strong'];
      const texts = ['Çok Zayıf', 'Zayıf', 'Orta', 'İyi', 'Güçlü'];
      const colors = ['var(--danger)', 'var(--danger)', 'var(--warning)', 'var(--warning)', 'var(--success)'];
      
      strengthBars.forEach((bar, index) => {
        bar.className = 'password-strength-bar';
        if (index < strength) {
          bar.classList.add('active', levels[strength]);
        }
      });
      
      if (password.length > 0) {
        strengthText.textContent = `Şifre gücü: ${texts[strength]}`;
        strengthText.style.color = colors[strength];
      } else {
        strengthText.textContent = 'Şifre gücü';
        strengthText.style.color = 'var(--text-muted)';
      }
    });
    
    // Form submit
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const submitBtn = document.getElementById('submitBtn');
      const btnText = submitBtn.querySelector('.btn-text');
      const spinner = document.getElementById('spinner');
      const alert = document.getElementById('alert');
      const alertMessage = document.getElementById('alert-message');
      const successAlert = document.getElementById('successAlert');
      
      if (password !== confirmPassword) {
        alertMessage.textContent = 'Şifreler eşleşmiyor!';
        alert.classList.remove('hidden');
        return;
      }
      
      if (password.length < 6) {
        alertMessage.textContent = 'Şifre en az 6 karakter olmalı!';
        alert.classList.remove('hidden');
        return;
      }
      
      submitBtn.disabled = true;
      btnText.textContent = 'Güncelleniyor...';
      spinner.classList.remove('hidden');
      alert.classList.add('hidden');
      
      try {
        const supabase = await Auth.init();
        const { error } = await supabase.auth.updateUser({
          password: password
        });
        
        if (error) {
          alertMessage.textContent = Auth.getErrorMessage(error);
          alert.classList.remove('hidden');
          submitBtn.disabled = false;
          btnText.textContent = '🔒 Şifreyi Güncelle';
          spinner.classList.add('hidden');
        } else {
          successAlert.classList.remove('hidden');
          btnText.textContent = '✓ Başarılı!';
          spinner.classList.add('hidden');
          
          setTimeout(() => {
            window.location.href = '/login';
          }, 3000);
        }
      } catch (error) {
        alertMessage.textContent = error.message;
        alert.classList.remove('hidden');
        submitBtn.disabled = false;
        btnText.textContent = '🔒 Şifreyi Güncelle';
        spinner.classList.add('hidden');
      }
    });
    
  </script>
</body>
</html>
